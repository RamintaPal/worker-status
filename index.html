<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Worker Status Tracker</title>
  <style>
    body { font-family: Arial; margin: 40px; }
    input, select, button { margin: 5px; padding: 5px; }
    table { border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; }
    th { background-color: #f2f2f2; }
    button { cursor: pointer; }
  </style>
</head>
<body>

<h2>Worker Status Tracker</h2>

<form id="workerForm">
  <input type="text" id="name" placeholder="Name" required>
  <input type="text" id="department" placeholder="Department">

  <select id="status">
    <option value="Work Trip">Work Trip</option>
    <option value="Sick">Sick</option>
    <option value="Vacation">Vacation</option>
    <option value="Personal Day">Personal Day</option>
  </select>

  <input type="date" id="startDate" required>
  <input type="date" id="endDate">
  <input type="text" id="notes" placeholder="Notes">

  <button type="submit">Add</button>
</form>

<h3>Records</h3>
<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Department</th>
      <th>Status</th>
      <th>Start</th>
      <th>End</th>
      <th>Notes</th>
      <th>Delete</th>
    </tr>
  </thead>
  <tbody id="recordsBody"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  onSnapshot, 
  deleteDoc, 
  doc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 PASTE YOUR REAL FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyBGNEWv4kZT1EoY9-QTqOZeCH5NUJoXwxA",
  authDomain: "worker-status-tracker.firebaseapp.com",
  projectId: "worker-status-tracker",
  storageBucket: "worker-status-tracker.firebasestorage.app",
  messagingSenderId: "457071297317",
  appId: "1:457071297317:web:53effe24df182f7b7050cc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const workersCollection = collection(db, "workers");

const form = document.getElementById("workerForm");
const recordsBody = document.getElementById("recordsBody");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  await addDoc(workersCollection, {
    name: document.getElementById("name").value,
    department: document.getElementById("department").value,
    status: document.getElementById("status").value,
    startDate: document.getElementById("startDate").value,
    endDate: document.getElementById("endDate").value,
    notes: document.getElementById("notes").value,
    created: new Date()
  });

  form.reset();
});

onSnapshot(workersCollection, (snapshot) => {
  recordsBody.innerHTML = "";

  snapshot.forEach((docItem) => {
    const data = docItem.data();

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${data.name}</td>
      <td>${data.department || ""}</td>
      <td>${data.status}</td>
      <td>${data.startDate}</td>
      <td>${data.endDate || ""}</td>
      <td>${data.notes || ""}</td>
      <td><button data-id="${docItem.id}">X</button></td>
    `;

    row.querySelector("button").addEventListener("click", async () => {
      await deleteDoc(doc(db, "workers", docItem.id));
    });

    recordsBody.appendChild(row);
  });
});

</script>

</body>
</html>
