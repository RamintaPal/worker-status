<!DOCTYPE html>
<html>
<head>
  <title>Worker Status Tracker</title>
  <meta charset="UTF-8">
</head>
<body>

<h2>Worker Status Tracker</h2>

<form id="workerForm">
  <input type="text" id="name" placeholder="Name" required>
  <input type="text" id="department" placeholder="Department">
  
  <select id="status">
    <option value="Work Trip">Work Trip</option>
    <option value="Sick">Sick</option>
    <option value="Vacation">Vacation</option>
    <option value="Personal Day">Personal Day</option>
  </select>

  <input type="date" id="startDate" required>
  <input type="date" id="endDate">
  <input type="text" id="notes" placeholder="Notes">

  <button type="submit">Add</button>
</form>

<h3>Records</h3>
<table border="1" id="recordsTable">
  <thead>
    <tr>
      <th>Name</th>
      <th>Department</th>
      <th>Status</th>
      <th>Start</th>
      <th>End</th>
      <th>Notes</th>
      <th>Delete</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script type="module">

// 🔥 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyBGNEWv4kZT1EoY9-QTqOZeCH5NUJoXwxA",
  authDomain: "worker-status-tracker.firebaseapp.com",
  projectId: "worker-status-tracker",
  storageBucket: "worker-status-tracker.firebasestorage.app",
  messagingSenderId: "457071297317",
  appId: "1:457071297317:web:53effe24df182f7b7050cc"
};
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById("workerForm");
const tableBody = document.querySelector("#recordsTable tbody");
const workersCollection = collection(db, "workers");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  await addDoc(workersCollection, {
    name: name.value,
    department: department.value,
    status: status.value,
    startDate: startDate.value,
    endDate: endDate.value,
    notes: notes.value,
    created: new Date()
  });

  form.reset();
});

onSnapshot(workersCollection, (snapshot) => {
  tableBody.innerHTML = "";
  snapshot.forEach((docItem) => {
    const data = docItem.data();
    const row = `
      <tr>
        <td>${data.name}</td>
        <td>${data.department}</td>
        <td>${data.status}</td>
        <td>${data.startDate}</td>
        <td>${data.endDate}</td>
        <td>${data.notes}</td>
        <td><button onclick="deleteRecord('${docItem.id}')">X</button></td>
      </tr>
    `;
    tableBody.innerHTML += row;
  });
});

window.deleteRecord = async (id) => {
  await deleteDoc(doc(db, "workers", id));
};

</script>

</body>
</html>
